<!DOCTYPE html>
<html>
<head>
    <title>Hotel Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url('/images/hotel-bg.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.6);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.4);
        }

        h1 {
            font-size: 22px;
            margin-bottom: 15px;
        }

        p {
            font-size: 14px;
            margin-bottom: 20px;
            color: #ddd;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #007bff, #00c6ff);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn:active {
            transform: scale(0.98);
        }

    </style>
</head>
<body>

<div class="overlay">
    <div class="container">
        <h1>Welcome to Rushi's Hotel</h1>
        <p>Manage Rooms, Bookings & Customers Easily</p>

        <a href="/login" class="btn">Login Now</a>
    </div>
</div>

</body>
</html>
