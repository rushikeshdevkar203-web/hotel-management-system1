<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url('/images/hotel-bg.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            background: rgba(0,0,0,0.6);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .form-box {
            width: 100%;
            max-width: 400px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 18px;
            color: white;
            box-shadow: 0 10px 35px rgba(0,0,0,0.4);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #007bff, #00c6ff);
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            transform: scale(1.03);
        }
    </style>
</head>
<body>

<div class="overlay">
    <div class="form-box">

        <h2>Add Product</h2>

        <form th:action="@{/save-product}" th:object="${product}" method="post">

            <label>Name</label>
            <input type="text" th:field="*{name}" required />

            <label>Category</label>
            <input type="text" th:field="*{category}" required />

            <label>Price</label>
            <input type="number" step="0.01" th:field="*{price}" required />

            <label>Stock Quantity</label>
            <input type="number" th:field="*{stockQuantity}" required />

            <label>Status</label>
            <select th:field="*{status}">
                <option value="Available">Available</option>
                <option value="Out of Stock">Out of Stock</option>
            </select>

            <button type="submit">Save Product</button>

        </form>

    </div>
</div>

</body>
</html>
