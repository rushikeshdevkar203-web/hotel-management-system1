<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Billing System</title>

<style>

body{
font-family:Arial;
background:url('/images/hotel-bg.jpg');
background-size:cover;
background-position:center;
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* Overlay */
.overlay {
    background: rgba(0, 0, 0, 0.6);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}
/* Glass Box */

.box{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
padding:40px;
width:320px;
border-radius:15px;
box-shadow:0 8px 30px rgba(0,0,0,0.4);
text-align:center;
color:white;
}

/* Title */

h2{
margin-bottom:20px;
}

/* Input */

input{
padding:12px;
width:90%;
border:none;
border-radius:6px;
margin-top:10px;
outline:none;
}

/* Button */

button{
margin-top:20px;
padding:12px;
width:95%;
border:none;
border-radius:6px;
background:#00c6ff;
color:white;
font-weight:bold;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#0072ff;
}

</style>

</head>

<body>

<div class="box">

<h2>🧾 Generate Room Bill</h2>

<form action="/generateBill" method="get">

<input type="text" name="roomNumber" placeholder="Enter Room Number" required>

<br>

<button type="submit">Generate Bill</button>

</form>

</div>

</body>
</html>
