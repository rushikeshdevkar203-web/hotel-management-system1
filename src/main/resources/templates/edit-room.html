<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Edit Room</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('/images/hotel-bg.jpg');
background-size:cover;
background-position:center;
}

/* Glass Box */

.glass-box{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
padding:35px;
border-radius:15px;
width:350px;
box-shadow:0 8px 32px rgba(0,0,0,0.3);
color:rgb(0, 0, 0);
}

/* Heading */

h2{
text-align:center;
margin-bottom:20px;
}

/* Inputs */

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:6px;
outline:none;
}

/* Button */

button{
width:100%;
padding:10px;
border:none;
border-radius:6px;
background:#007bff;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

/* Back link */

a{
display:block;
text-align:center;
margin-top:15px;
color:white;
text-decoration:none;
}

a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="glass-box">

<h2>Edit Room</h2>

<form th:action="@{'/update-room/' + ${room.id}}"
      th:object="${room}"
      method="post">

Room No:
<input type="text" th:field="*{roomNumber}" required>

Room Type:
<input type="text" th:field="*{roomType}" required>

Price:
<input type="number" step="0.01" th:field="*{price}" required>

Status:
<input type="text" th:field="*{status}" required>

<br><br>

<button type="submit">Update</button>

</form>

<a href="/rooms">Back to Rooms</a>

</div>

</body>
