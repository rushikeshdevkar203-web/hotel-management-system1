<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hotel Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url('/images/hotel-bg.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* Overlay */
        .overlay {
            background: rgba(0, 0, 0, 0.4);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Glass Card */
        .form-container {
            width: 100%;
            max-width: 400px;   /* important for mobile ratio */
            padding: 30px 25px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            color: white;
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        input:focus {
            box-shadow: 0 0 6px #00ffcc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #141e30, #243b55);
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.03);
            background: linear-gradient(90deg, #243b55, #141e30);
        }

        .footer-text {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #ddd;
        }

        /* Extra small devices fix */
        @media (max-width: 360px) {
            .form-container {
                padding: 20px 15px;
            }
        }

    </style>
</head>
<body>

<div class="overlay">

    <div class="form-container">
        <h2>Welcome Back, Rushikesh 👋</h2>

        <form th:action="@{/login}" method="post">
            <input type="text" name="username" placeholder="Username" required />
            <input type="password" name="password" placeholder="Password" required />
            <button type="submit">Login</button>
        </form>

        <div class="footer-text">
            Hotel Management System © 2026
        </div>
    </div>

</div>

</body>
</html>
